{{- /*
ServiceMonitor — Prometheus/OTel scrape target for the agent-runtime metrics
endpoint (atlas-docs/04 §4.2). Off by default; enabled where the Prometheus
Operator CRDs are installed and the /metrics endpoint is exposed.
*/ -}}
{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "atlas-agent-runtime.fullname" . }}
  labels:
    {{- include "atlas-agent-runtime.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "atlas-agent-runtime.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
