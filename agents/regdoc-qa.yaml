# RegDoc Q&A agent (AGT-11). Resolved by POST /v1/agent/runs?agent_name=regdoc-qa.
# model_alias is a model the gateway serves: the local loop wires Ollama
# (gpt-oss:120b-cloud) for real, free, no-key inference; set "mock" to fall back
# to the gateway MockProvider, or a provider-backed alias in real envs.
agent_name: regdoc-qa
agent_version: "1.0.0"
system_prompt_ref: prompts/regdoc-qa/1.0.0/system.txt
model_alias: gpt-oss:120b-cloud
tool_whitelist:
  - doc_search
  - verify_citation
max_iterations: 8
token_budget: 4096
timeout_s: 60
