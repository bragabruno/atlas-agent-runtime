# Load-test variant of regdoc-qa (AGT-11): identical caps, but model_alias
# "mock" routes to the gateway's MockProvider so stress runs (Locust) never
# touch a real provider or the local Ollama. The demo spec stays regdoc-qa.
agent_name: regdoc-qa-mock
agent_version: "1.0.0"
system_prompt_ref: prompts/regdoc-qa/1.0.0/system.txt
model_alias: mock
tool_whitelist:
  - doc_search
  - verify_citation
max_iterations: 8
token_budget: 4096
timeout_s: 60
